spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/enesincekaraa/shopflow-config
          default-label: main
          clone-on-start: true
          force-pull: true

server:
  port: 8888

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always