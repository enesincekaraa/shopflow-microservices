spring:
  application:
    name: order-service
  cloud:
    openfeign:
      okhttp:
        enabled: true
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 5000
          product-service:
            connect-timeout: 2000
            read-timeout: 3000
          customer-service:
            connect-timeout: 2000
            read-timeout: 3000

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/orderdb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8083

# Diğer servislerin adresleri
services:
  product-service:
    url: http://${PRODUCT_SERVICE_HOST:localhost}:8081
  customer-service:
    url: http://${CUSTOMER_SERVICE_HOST:localhost}:8082

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always