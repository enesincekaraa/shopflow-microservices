services:

  # ---- Config Server ----
  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    networks:
      - shopflow-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ---- Eureka Server ----
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - shopflow-network
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ---- Veritabanları ----
  product-db:
    image: postgres:16-alpine
    container_name: product-db
    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - product_data:/var/lib/postgresql/data
    networks:
      - shopflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  customer-db:
    image: postgres:16-alpine
    container_name: customer-db
    environment:
      POSTGRES_DB: customerdb
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - customer_data:/var/lib/postgresql/data
    networks:
      - shopflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-db:
    image: postgres:16-alpine
    container_name: order-db
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - order_data:/var/lib/postgresql/data
    networks:
      - shopflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Servisler ----
  product-service:
    build: ./product-service
    container_name: product-service
    env_file: .env
    environment:
      DB_HOST: product-db
      CONFIG_SERVER_HOST: config-server
      EUREKA_HOST: eureka-server
    ports:
      - "8081:8081"
    depends_on:
      product-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - shopflow-network

  customer-service:
    build: ./customer-service
    container_name: customer-service
    env_file: .env
    environment:
      DB_HOST: customer-db
      CONFIG_SERVER_HOST: config-server
      EUREKA_HOST: eureka-server
    ports:
      - "8082:8082"
    depends_on:
      customer-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - shopflow-network

  order-service:
    build: ./order-service
    container_name: order-service
    env_file: .env
    environment:
      DB_HOST: order-db
      CONFIG_SERVER_HOST: config-server
      EUREKA_HOST: eureka-server
    ports:
      - "8083:8083"
    depends_on:
      order-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      product-service:
        condition: service_started
      customer-service:
        condition: service_started
    networks:
      - shopflow-network

networks:
  shopflow-network:
    driver: bridge

volumes:
  product_data:
  customer_data:
  order_data: