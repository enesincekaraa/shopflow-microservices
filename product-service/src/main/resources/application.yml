spring:
  application:
    name: product-service
  config:
    import: "configserver:http://${CONFIG_SERVER_HOST:localhost}:8888"

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/productdb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always